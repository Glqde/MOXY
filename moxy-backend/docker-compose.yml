##############################################################################
# MOXY — Docker Compose
##############################################################################

name: moxy

x-common-env: &common-env
  APP_ENV: ${APP_ENV:-development}
  DATABASE_URL: postgresql+asyncpg://moxy:${POSTGRES_PASSWORD:-moxy_secret}@db:5432/moxy
  REDIS_URL: redis://redis:6379/0
  REDIS_CELERY_URL: redis://redis:6379/1
  SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production-min-32-chars}
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
  SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}

x-api-base: &api-base
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  environment:
    <<: *common-env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - moxy-internal
    - moxy-external

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moxy
      POSTGRES_USER: moxy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moxy_secret}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moxy -d moxy"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - moxy-internal
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - moxy-internal
    deploy:
      resources:
        limits:
          memory: 300m

  # ── FastAPI API Server ──────────────────────────────────────────────────────
  api:
    <<: *api-base
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --loop uvloop
      --workers 2
      --access-log
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./app:/app/app:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.moxy.local`)"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    <<: *api-base
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=celery,notifications,reminders
      --prefetch-multiplier=1
      --max-tasks-per-child=1000
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512m

  # ── Celery Beat ─────────────────────────────────────────────────────────────
  beat:
    <<: *api-base
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    environment:
      <<: *common-env
      REDBEAT_REDIS_URL: redis://redis:6379/2
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 128m

  # ── Celery Flower ───────────────────────────────────────────────────────────
  flower:
    <<: *api-base
    command: >
      celery -A app.workers.celery_app flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flower_secret}
    ports:
      - "5555:5555"
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 128m

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    profiles:
      - prod
    networks:
      - moxy-internal
      - moxy-external
    deploy:
      resources:
        limits:
          memory: 64m

  # ── DB Migrator ─────────────────────────────────────────────────────────────
  migrator:
    <<: *api-base
    command: alembic upgrade head
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrate

  # ── Redis Commander ─────────────────────────────────────────────────────────
  redis-ui:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: "local:redis:6379:0"
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - devtools
    networks:
      - moxy-internal

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  moxy-internal:
    driver: bridge
  moxy-external:
    driver: bridge